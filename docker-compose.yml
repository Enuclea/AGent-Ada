version: '3.8'

services:
  ada-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-core
    privileged: true
    user: "1000:1000"
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./src/agent/routes/custom:/app/src/agent/routes/custom
      - ./src/agent/static:/app/src/agent/static
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - ./scratch:/app/scratch
      - ${HOME}/.gemini:/app/.gemini
      - ${HOME}/.agent:/app/.agent
      # Note: Mounts the Google AntiGravity CLI binary from the host.
      # The agy CLI must be installed and configured on the host for the user running docker compose.
      - ${HOME}/.local/bin/agy:/app/.local/bin/agy
      # Note: Local workspace directory mounts giving AI agents host filesystem access.
      # Customize these local path decisions to match your installation.
      - ${HOME}/AGent-Ada:${HOME}/AGent-Ada:rw
      - ${HOME}/AGent:${HOME}/AGent:rw
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - ANTIGRAVITY_HARNESS_PATH=/app/.local/bin/agy
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - ADA_DISABLE_SANDBOX=1
    cap_add:
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ada-config:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-config
    privileged: true
    user: "1000:1000"
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    command: ["python", "-m", "agent.cli", "ui", "--port", "8050", "--host", "0.0.0.0"]
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./src/agent/routes/custom:/app/src/agent/routes/custom
      - ./src/agent/static:/app/src/agent/static
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - ./scratch:/app/scratch
      - ${HOME}/.gemini:/app/.gemini
      - ${HOME}/.agent:/app/.agent
      # Note: Mounts the Google AntiGravity CLI binary from the host.
      # The agy CLI must be installed and configured on the host for the user running docker compose.
      - ${HOME}/.local/bin/agy:/app/.local/bin/agy
      # Note: Local workspace directory mounts giving AI agents host filesystem access.
      # Customize these local path decisions to match your installation.
      - ${HOME}/AGent-Ada:${HOME}/AGent-Ada:rw
      - ${HOME}/AGent:${HOME}/AGent:rw
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - CORE_API_URL=http://127.0.0.1:8000
      - HOST_COMMAND_CHANNEL_IP=127.0.0.1
      - ANTIGRAVITY_HARNESS_PATH=/app/.local/bin/agy
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - ADA_DISABLE_SANDBOX=1
    cap_add:
      - SYS_ADMIN
    depends_on:
      - ada-core

  ada-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-bot
    privileged: true
    user: "1000:1000"
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    command: ["python", "discord/bot.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./discord:/app/discord
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - ./scratch:/app/scratch
      - ${HOME}/.gemini:/app/.gemini
      - ${HOME}/.agent:/app/.agent
      # Note: Mounts the Google AntiGravity CLI binary from the host.
      # The agy CLI must be installed and configured on the host for the user running docker compose.
      - ${HOME}/.local/bin/agy:/app/.local/bin/agy
      # Note: Local workspace directory mounts giving AI agents host filesystem access.
      # Customize these local path decisions to match your installation.
      - ${HOME}/AGent-Ada:${HOME}/AGent-Ada:rw
      - ${HOME}/AGent:${HOME}/AGent:rw
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - AGENT_API_BASE=http://127.0.0.1:8000
      - RUN_DISCORD_BOT=true
      - ANTIGRAVITY_HARNESS_PATH=/app/.local/bin/agy
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - ADA_DISABLE_SANDBOX=1
    cap_add:
      - SYS_ADMIN
    depends_on:
      - ada-core

  ada-pubsub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-pubsub
    privileged: true
    user: "1000:1000"
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    command: ["python", "src/agent/observability/pubsub_listener.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - ./scratch:/app/scratch
      - ${HOME}/.gemini:/app/.gemini
      - ${HOME}/.agent:/app/.agent
      # Note: Mounts the Google AntiGravity CLI binary from the host.
      # The agy CLI must be installed and configured on the host for the user running docker compose.
      - ${HOME}/.local/bin/agy:/app/.local/bin/agy
      # Note: Local workspace directory mounts giving AI agents host filesystem access.
      # Customize these local path decisions to match your installation.
      - ${HOME}/AGent-Ada:${HOME}/AGent-Ada:rw
      - ${HOME}/AGent:${HOME}/AGent:rw
      - ./src/agent/observability/pubsub_listener.py:/app/src/agent/observability/pubsub_listener.py:ro
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - ANTIGRAVITY_HARNESS_PATH=/app/.local/bin/agy
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - ADA_DISABLE_SANDBOX=1
    cap_add:
      - SYS_ADMIN
    depends_on:
      - ada-core
