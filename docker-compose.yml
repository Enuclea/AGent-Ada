version: '3.8'

services:
  ada-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-core
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./src/agent/routes/custom:/app/src/agent/routes/custom
      - ./src/agent/static:/app/src/agent/static
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - /home/dan/.gemini/config:/app/.gemini/config
      - /home/dan/.agent:/app/.agent
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ada-config:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-config
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    command: ["python", "-m", "agent.cli", "ui", "--port", "8050", "--host", "0.0.0.0"]
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./src/agent/routes/custom:/app/src/agent/routes/custom
      - ./src/agent/static:/app/src/agent/static
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - /home/dan/.gemini/config:/app/.gemini/config
      - /home/dan/.agent:/app/.agent
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - CORE_API_URL=http://127.0.0.1:8000
      - HOST_COMMAND_CHANNEL_IP=127.0.0.1
    depends_on:
      - ada-core

  ada-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ada-bot
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    command: ["python", "discord/bot.py"]
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./plugins:/app/plugins
      - ./discord:/app/discord
      - ./.agents:/app/.agents
      - ./enuclea:/app/enuclea
      - /home/dan/.gemini/config:/app/.gemini/config
      - /home/dan/.agent:/app/.agent
    environment:
      - PYTHONUNBUFFERED=1
      - HOME=/app
      - AGENT_DB_PATH=/data/history.db
      - AGENT_API_BASE=http://127.0.0.1:8000
      - RUN_DISCORD_BOT=true
    depends_on:
      - ada-core
